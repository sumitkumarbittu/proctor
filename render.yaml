databases:
  - name: proctor-db
    databaseName: proctor
    user: proctor
    plan: free

services:
  - type: web
    name: proctor-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proctor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: SQLALCHEMY_ECHO
        value: false
      - key: DB_POOL_SIZE
        value: 3
      - key: DB_MAX_OVERFLOW
        value: 0
      - key: DB_POOL_TIMEOUT
        value: 10
      - key: DB_POOL_RECYCLE_SECONDS
        value: 1800

  - type: web
    name: proctor-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
