services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=proctor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proctor"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      - POSTGRES_SERVER=db
      - DATABASE_URL=
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app # Hot reload for development
    command: /start.sh

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "80:80"

volumes:
  postgres_data:
